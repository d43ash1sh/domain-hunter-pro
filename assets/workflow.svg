<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 500" width="900" height="500">
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;700&amp;family=Fira+Code:wght@400;700&amp;display=swap');
      .node-title {
        font-family: 'Outfit', sans-serif;
        font-weight: 700;
        font-size: 16px;
        fill: #ffffff;
      }
      .node-desc {
        font-family: 'Outfit', sans-serif;
        font-weight: 400;
        font-size: 12px;
        fill: #94a3b8;
      }
      .arrow-label {
        font-family: 'Fira Code', monospace;
        font-weight: 700;
        font-size: 11px;
        fill: #00f2fe;
      }
      .main-title {
        font-family: 'Outfit', sans-serif;
        font-weight: 700;
        font-size: 22px;
        fill: #ffffff;
        letter-spacing: 1px;
      }
    </style>

    <linearGradient id="cyanPurple" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#00f2fe" />
      <stop offset="100%" stop-color="#9b51e0" />
    </linearGradient>

    <linearGradient id="glassGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0f172a" />
      <stop offset="100%" stop-color="#030712" />
    </linearGradient>

    <filter id="neonCyan" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="5" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>

    <filter id="shadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="8" stdDeviation="6" flood-color="#000" flood-opacity="0.5" />
    </filter>

    <!-- Marker for arrowheads -->
    <marker id="arrow" viewBox="0 0 10 10" refX="6" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 1 L 10 5 L 0 9 z" fill="#00f2fe" />
    </marker>
    <marker id="arrow-purple" viewBox="0 0 10 10" refX="6" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 1 L 10 5 L 0 9 z" fill="#9b51e0" />
    </marker>
  </defs>

  <!-- Background -->
  <rect width="100%" height="100%" fill="#030712" rx="16" />

  <!-- Flowchart Title -->
  <text x="450" y="45" text-anchor="middle" class="main-title">DOMAIN HUNTER PRO • SCAN WORKFLOW</text>
  <line x1="350" y1="60" x2="550" y2="60" stroke="url(#cyanPurple)" stroke-width="2" />

  <!-- 1. USER INPUT -->
  <g transform="translate(50, 200)" filter="url(#shadow)">
    <rect width="160" height="80" rx="8" fill="url(#glassGrad)" stroke="#1e293b" stroke-width="1.5" />
    <rect width="160" height="80" rx="8" fill="none" stroke="url(#cyanPurple)" stroke-width="1.5" opacity="0.6" />
    <!-- Indicator Bar -->
    <rect width="6" height="80" rx="3" fill="#9b51e0" />
    <text x="20" y="32" class="node-title">1. User Input</text>
    <text x="20" y="52" class="node-desc">Enter Brand / Keyword</text>
    <text x="20" y="66" class="node-desc">(e.g. "mycybersec")</text>
  </g>

  <!-- Arrow 1 -> 2 -->
  <line x1="210" y1="240" x2="264" y2="240" stroke="#00f2fe" stroke-width="2" marker-end="url(#arrow)" />

  <!-- 2. RDAP LOOKUP -->
  <g transform="translate(270, 200)" filter="url(#shadow)">
    <rect width="170" height="80" rx="8" fill="url(#glassGrad)" stroke="#1e293b" stroke-width="1.5" />
    <rect width="170" height="80" rx="8" fill="none" stroke="#00f2fe" stroke-width="1.5" filter="url(#neonCyan)" opacity="0.4" />
    <!-- Indicator Bar -->
    <rect width="6" height="80" rx="3" fill="#00f2fe" />
    <text x="20" y="32" class="node-title">2. RDAP Query</text>
    <text x="20" y="52" class="node-desc">Query rdap.org/domain</text>
    <text x="20" y="66" class="node-desc">via curl API call</text>
  </g>

  <!-- Arrow 2 -> 3 (Split) -->
  <line x1="440" y1="240" x2="494" y2="240" stroke="#00f2fe" stroke-width="2" marker-end="url(#arrow)" />

  <!-- 3. DECISION: RDAP Success or Fails? -->
  <g transform="translate(500, 195)" filter="url(#shadow)">
    <!-- Diamond representation using polygon -->
    <polygon points="60,0 120,45 60,90 0,45" fill="url(#glassGrad)" stroke="#1e293b" stroke-width="1.5" />
    <polygon points="60,0 120,45 60,90 0,45" fill="none" stroke="url(#cyanPurple)" stroke-width="1.5" opacity="0.7" />
    <text x="60" y="42" text-anchor="middle" class="node-title" style="font-size: 12px;">HTTP 404 or</text>
    <text x="60" y="58" text-anchor="middle" class="node-title" style="font-size: 12px;">Valid JSON?</text>
  </g>

  <!-- Arrow 3 -> Available (Up - Available via RDAP) -->
  <path d="M 560 195 L 560 130 L 684 130" fill="none" stroke="#22c55e" stroke-width="2" marker-end="url(#arrow)" />
  <text x="568" y="155" class="arrow-label" style="fill: #22c55e;">HTTP 404</text>

  <!-- Arrow 3 -> Registered (Right - Registered via RDAP) -->
  <path d="M 620 240 L 684 240" fill="none" stroke="#ef4444" stroke-width="2" marker-end="url(#arrow)" />
  <text x="625" y="232" class="arrow-label" style="fill: #ef4444;">JSON Valid</text>

  <!-- Arrow 3 -> Fallback (Down - RDAP Fails or Timeout) -->
  <path d="M 560 285 L 560 350 L 264 350" fill="none" stroke="#9b51e0" stroke-width="2" marker-end="url(#arrow-purple)" />
  <text x="450" y="342" class="arrow-label" style="fill: #9b51e0;">RDAP Fails / Timeout / Offline</text>

  <!-- 4. FALLBACK WHOIS -->
  <g transform="translate(90, 310)" filter="url(#shadow)">
    <rect width="170" height="80" rx="8" fill="url(#glassGrad)" stroke="#1e293b" stroke-width="1.5" />
    <rect width="170" height="80" rx="8" fill="none" stroke="#9b51e0" stroke-width="1.5" opacity="0.6" />
    <!-- Indicator Bar -->
    <rect width="6" height="80" rx="3" fill="#9b51e0" />
    <text x="20" y="32" class="node-title">3. Fallback WHOIS</text>
    <text x="20" y="52" class="node-desc">Query system WHOIS</text>
    <text x="20" y="66" class="node-desc">client locally</text>
  </g>

  <!-- Arrow 4 -> 5 (WHOIS Output check) -->
  <line x1="175" y1="390" x2="175" y2="420" stroke="#9b51e0" stroke-width="2" />
  <path d="M 175 420 L 770 420 L 770 285" fill="none" stroke="#9b51e0" stroke-width="2" marker-end="url(#arrow-purple)" />
  <text x="350" y="412" class="arrow-label" style="fill: #9b51e0;">Checks WHOIS Output for: "No match", "NOT FOUND", etc.</text>

  <!-- RESULTS SECTION -->

  <!-- STATE A: AVAILABLE -->
  <g transform="translate(690, 90)" filter="url(#shadow)">
    <rect width="160" height="70" rx="8" fill="#064e3b" stroke="#059669" stroke-width="2" />
    <!-- Glow -->
    <rect width="160" height="70" rx="8" fill="none" stroke="#10b981" stroke-width="1" opacity="0.7" />
    <text x="20" y="30" class="node-title" style="fill: #a7f3d0;">✔ AVAILABLE</text>
    <text x="20" y="50" class="node-desc" style="fill: #34d399;">Green Console Output</text>
  </g>

  <!-- STATE B: REGISTERED -->
  <g transform="translate(690, 205)" filter="url(#shadow)">
    <rect width="160" height="70" rx="8" fill="#7f1d1d" stroke="#dc2626" stroke-width="2" />
    <!-- Glow -->
    <rect width="160" height="70" rx="8" fill="none" stroke="#ef4444" stroke-width="1" opacity="0.7" />
    <text x="20" y="30" class="node-title" style="fill: #fca5a5;">✖ REGISTERED</text>
    <text x="20" y="50" class="node-desc" style="fill: #f87171;">Red Console Output</text>
  </g>
</svg>
