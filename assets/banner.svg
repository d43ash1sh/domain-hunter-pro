<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 500" width="1200" height="500">
  <defs>
    <!-- Fonts import -->
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;800&amp;family=Fira+Code:wght@400;700&amp;display=swap');
      .title-text {
        font-family: 'Outfit', sans-serif;
        font-weight: 800;
        font-size: 64px;
        fill: #ffffff;
      }
      .subtitle-text {
        font-family: 'Outfit', sans-serif;
        font-weight: 400;
        font-size: 20px;
        fill: #94a3b8;
      }
      .badge-text {
        font-family: 'Fira Code', monospace;
        font-weight: 700;
        font-size: 14px;
        fill: #00f2fe;
        letter-spacing: 2px;
      }
      .feature-text {
        font-family: 'Outfit', sans-serif;
        font-weight: 600;
        font-size: 16px;
        fill: #f1f5f9;
      }
    </style>

    <!-- Gradients -->
    <linearGradient id="cyberGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#00f2fe" />
      <stop offset="50%" stop-color="#9b51e0" />
      <stop offset="100%" stop-color="#3b82f6" />
    </linearGradient>
    
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#070c19" />
      <stop offset="100%" stop-color="#02040a" />
    </linearGradient>

    <!-- Glowing Filters -->
    <filter id="neonCyan" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="8" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
    <filter id="neonPurple" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="15" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="100%" height="100%" fill="url(#bgGrad)" />

  <!-- Background Grid -->
  <g stroke="#1e293b" stroke-width="1" opacity="0.25">
    <!-- Horizontal Grid Lines -->
    <line x1="0" y1="50" x2="1200" y2="50" />
    <line x1="0" y1="100" x2="1200" y2="100" />
    <line x1="0" y1="150" x2="1200" y2="150" />
    <line x1="0" y1="200" x2="1200" y2="200" />
    <line x1="0" y1="250" x2="1200" y2="250" />
    <line x1="0" y1="300" x2="1200" y2="300" />
    <line x1="0" y1="350" x2="1200" y2="350" />
    <line x1="0" y1="400" x2="1200" y2="400" />
    <line x1="0" y1="450" x2="1200" y2="450" />
    <!-- Vertical Grid Lines -->
    <line x1="100" y1="0" x2="100" y2="500" />
    <line x1="200" y1="0" x2="200" y2="500" />
    <line x1="300" y1="0" x2="300" y2="500" />
    <line x1="400" y1="0" x2="400" y2="500" />
    <line x1="500" y1="0" x2="500" y2="500" />
    <line x1="600" y1="0" x2="600" y2="500" />
    <line x1="700" y1="0" x2="700" y2="500" />
    <line x1="800" y1="0" x2="800" y2="500" />
    <line x1="900" y1="0" x2="900" y2="500" />
    <line x1="1000" y1="0" x2="1000" y2="500" />
    <line x1="1100" y1="0" x2="1100" y2="500" />
  </g>

  <!-- Glowing Nebulas in Background -->
  <circle cx="950" cy="250" r="180" fill="#9b51e0" opacity="0.15" filter="url(#neonPurple)" />
  <circle cx="200" cy="150" r="150" fill="#00f2fe" opacity="0.1" filter="url(#neonCyan)" />

  <!-- Left Content (Branding & Text) -->
  <g transform="translate(100, 110)">
    <!-- Badge -->
    <rect x="0" y="0" width="160" height="28" rx="6" fill="#0e1726" stroke="#1e293b" stroke-width="1.5" />
    <text x="12" y="18" class="badge-text">BASH v4.0+</text>
    
    <!-- Title -->
    <text x="0" y="85" class="title-text">
      DOMAIN <tspan fill="url(#cyberGrad)">HUNTER</tspan> PRO
    </text>

    <!-- Subtitle -->
    <text x="0" y="130" class="subtitle-text">
      Professional Bash Tool for Instant RDAP &amp; WHOIS Domain Availability Checking
    </text>

    <!-- Divider Line -->
    <line x1="0" y1="165" x2="600" y2="165" stroke="#1e293b" stroke-width="2" />

    <!-- Feature Badges -->
    <g transform="translate(0, 195)">
      <!-- Feature 1 -->
      <rect x="0" y="0" width="160" height="40" rx="20" fill="#0e1726" stroke="#00f2fe" stroke-width="1" opacity="0.9" />
      <text x="20" y="25" class="feature-text">⚡ RDAP Lookup</text>

      <!-- Feature 2 -->
      <rect x="180" y="0" width="180" height="40" rx="20" fill="#0e1726" stroke="#9b51e0" stroke-width="1" opacity="0.9" />
      <text x="20" y="25" class="feature-text">🛡️ Fallback WHOIS</text>

      <!-- Feature 3 -->
      <rect x="380" y="0" width="180" height="40" rx="20" fill="#0e1726" stroke="#3b82f6" stroke-width="1" opacity="0.9" />
      <text x="20" y="25" class="feature-text">🔍 18+ Core TLDs</text>
    </g>
  </g>

  <!-- Right Content (Interactive Radar Scope Graphic) -->
  <g transform="translate(880, 250)">
    <!-- Glowing background glow for the radar -->
    <circle cx="0" cy="0" r="140" fill="none" stroke="url(#cyberGrad)" stroke-width="2" opacity="0.2" />
    
    <!-- Rotating Sweep effect (Vector static representation) -->
    <path d="M0,0 L0,-130 A130,130 0 0,1 92,-92 Z" fill="url(#cyberGrad)" opacity="0.1" />

    <!-- Circles -->
    <circle cx="0" cy="0" r="130" fill="none" stroke="url(#cyberGrad)" stroke-width="3" filter="url(#neonCyan)" />
    <circle cx="0" cy="0" r="100" fill="none" stroke="#1e293b" stroke-width="1.5" />
    <circle cx="0" cy="0" r="70" fill="none" stroke="url(#cyberGrad)" stroke-width="1" opacity="0.4" />
    <circle cx="0" cy="0" r="40" fill="none" stroke="#1e293b" stroke-width="1.5" />

    <!-- Crosshairs -->
    <line x1="-140" y1="0" x2="140" y2="0" stroke="url(#cyberGrad)" stroke-width="1.5" stroke-dasharray="6 6" opacity="0.4" />
    <line x1="0" y1="-140" x2="0" y2="140" stroke="url(#cyberGrad)" stroke-width="1.5" stroke-dasharray="6 6" opacity="0.4" />

    <!-- Target Dots -->
    <circle cx="60" cy="-60" r="6" fill="#00f2fe" filter="url(#neonCyan)" />
    <circle cx="60" cy="-60" r="15" fill="none" stroke="#00f2fe" stroke-width="1" opacity="0.5" />
    
    <circle cx="-50" cy="40" r="5" fill="#9b51e0" filter="url(#neonPurple)" />
    
    <circle cx="30" cy="80" r="4" fill="#00f2fe" />
    <circle cx="-70" cy="-70" r="4" fill="#ffffff" opacity="0.6" />

    <!-- Scanning Target Overlay -->
    <path d="M-20,-20 L-20,-10 M-20,-20 L-10,-20" stroke="#ffffff" stroke-width="2" fill="none" />
    <path d="M20,-20 L20,-10 M20,-20 L10,-20" stroke="#ffffff" stroke-width="2" fill="none" />
    <path d="M-20,20 L-20,10 M-20,20 L-10,20" stroke="#ffffff" stroke-width="2" fill="none" />
    <path d="M20,20 L20,10 M20,20 L10,20" stroke="#ffffff" stroke-width="2" fill="none" />
  </g>

  <!-- Outer Neon Border -->
  <rect x="15" y="15" width="1170" height="470" rx="12" fill="none" stroke="url(#cyberGrad)" stroke-width="2" opacity="0.3" />
</svg>
