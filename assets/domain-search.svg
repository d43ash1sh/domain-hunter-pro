<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400" width="800" height="400">
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;700&amp;family=Fira+Code:wght@400;700&amp;display=swap');
      .node-text {
        font-family: 'Outfit', sans-serif;
        font-weight: 700;
        font-size: 14px;
        fill: #ffffff;
      }
      .node-status {
        font-family: 'Fira Code', monospace;
        font-weight: 700;
        font-size: 10px;
      }
      .input-text {
        font-family: 'Fira Code', monospace;
        font-weight: 400;
        font-size: 16px;
        fill: #00f2fe;
      }
      .title-label {
        font-family: 'Outfit', sans-serif;
        font-weight: 600;
        font-size: 12px;
        fill: #94a3b8;
        letter-spacing: 1px;
      }
    </style>
    
    <linearGradient id="cyanPurple" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#00f2fe" />
      <stop offset="100%" stop-color="#9b51e0" />
    </linearGradient>

    <linearGradient id="nodeGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1e293b" />
      <stop offset="100%" stop-color="#0f172a" />
    </linearGradient>

    <!-- Glow filters -->
    <filter id="cyanGlow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="6" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
    <filter id="greenGlow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="8" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
    <filter id="redGlow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="8" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="100%" height="100%" fill="#030712" rx="16" />

  <!-- Network Mesh (glowing background connections) -->
  <g opacity="0.3" stroke-width="1.5">
    <!-- Connecting central input to outer TLDs -->
    <line x1="220" y1="200" x2="450" y2="80" stroke="#9b51e0" />
    <line x1="220" y1="200" x2="480" y2="150" stroke="#00f2fe" />
    <line x1="220" y1="200" x2="490" y2="230" stroke="#00f2fe" stroke-dasharray="4 4" />
    <line x1="220" y1="200" x2="460" y2="310" stroke="#9b51e0" />
    
    <!-- Outer network interconnections -->
    <line x1="450" y1="80" x2="630" y2="70" stroke="#1e293b" />
    <line x1="480" y1="150" x2="660" y2="160" stroke="#1e293b" />
    <line x1="490" y1="230" x2="670" y2="240" stroke="#1e293b" />
    <line x1="460" y1="310" x2="640" y2="320" stroke="#1e293b" />
    <line x1="450" y1="80" x2="480" y2="150" stroke="#1e293b" />
    <line x1="480" y1="150" x2="490" y2="230" stroke="#1e293b" />
    <line x1="490" y1="230" x2="460" y2="310" stroke="#1e293b" />
  </g>

  <!-- Central Search Console Node -->
  <g transform="translate(40, 150)">
    <!-- Main glassmorphic container -->
    <rect width="280" height="100" rx="10" fill="#0f172a" stroke="#1e293b" stroke-width="1.5" />
    <rect width="280" height="100" rx="10" fill="none" stroke="url(#cyanPurple)" stroke-width="1.5" opacity="0.6" />
    
    <!-- Console Header -->
    <rect width="280" height="24" rx="10" fill="#020617" opacity="0.8" />
    <circle cx="15" cy="12" r="4" fill="#ef4444" />
    <circle cx="27" cy="12" r="4" fill="#eab308" />
    <circle cx="39" cy="12" r="4" fill="#22c55e" />
    <text x="60" y="16" class="title-label" style="font-size: 10px;">DOMAIN HUNTER CONSOLE</text>

    <!-- Search Input Representation -->
    <text x="15" y="60" class="input-text">$ hunt --query <tspan fill="#ffffff" font-weight="bold">hunterpro</tspan></text>
    <line x1="235" y1="46" x2="235" y2="64" stroke="#00f2fe" stroke-width="2">
      <animate attributeName="opacity" values="1;0;1" dur="1s" repeatCount="indefinite" />
    </line>
    <text x="15" y="85" class="title-label" style="fill: #64748b; font-size: 10px;">[Initializing Parallel Domain Sweep...]</text>
  </g>

  <!-- Right TLD Nodes representing Availability Results -->

  <!-- NODE 1: .com (REGISTERED) -->
  <g transform="translate(420, 40)">
    <rect width="180" height="50" rx="8" fill="url(#nodeGrad)" stroke="#1e293b" stroke-width="1.5" />
    <rect width="180" height="50" rx="8" fill="none" stroke="#ef4444" stroke-width="1.5" opacity="0.3" />
    <circle cx="25" cy="25" r="10" fill="#ef4444" filter="url(#redGlow)" />
    <!-- X mark in the red dot -->
    <path d="M22,22 L28,28 M28,22 L22,28" stroke="#ffffff" stroke-width="1.5" />
    <text x="50" y="24" class="node-text">hunterpro.com</text>
    <text x="50" y="38" class="node-status" fill="#fca5a5">REGISTERED (RDAP)</text>
  </g>

  <!-- NODE 2: .io (AVAILABLE) -->
  <g transform="translate(450, 115)">
    <rect width="180" height="50" rx="8" fill="url(#nodeGrad)" stroke="#1e293b" stroke-width="1.5" />
    <rect width="180" height="50" rx="8" fill="none" stroke="#22c55e" stroke-width="1.5" filter="url(#greenGlow)" opacity="0.4" />
    <circle cx="25" cy="25" r="10" fill="#22c55e" filter="url(#greenGlow)" />
    <!-- Check mark in the green dot -->
    <path d="M21,25 L24,28 L29,21" stroke="#ffffff" stroke-width="1.5" fill="none" />
    <text x="50" y="24" class="node-text">hunterpro.io</text>
    <text x="50" y="38" class="node-status" fill="#a7f3d0">AVAILABLE (RDAP)</text>
  </g>

  <!-- NODE 3: .dev (AVAILABLE) -->
  <g transform="translate(460, 190)">
    <rect width="180" height="50" rx="8" fill="url(#nodeGrad)" stroke="#1e293b" stroke-width="1.5" />
    <rect width="180" height="50" rx="8" fill="none" stroke="#22c55e" stroke-width="1.5" filter="url(#greenGlow)" opacity="0.4" />
    <circle cx="25" cy="25" r="10" fill="#22c55e" filter="url(#greenGlow)" />
    <path d="M21,25 L24,28 L29,21" stroke="#ffffff" stroke-width="1.5" fill="none" />
    <text x="50" y="24" class="node-text">hunterpro.dev</text>
    <text x="50" y="38" class="node-status" fill="#a7f3d0">AVAILABLE (RDAP)</text>
  </g>

  <!-- NODE 4: .ai (REGISTERED) -->
  <g transform="translate(450, 265)">
    <rect width="180" height="50" rx="8" fill="url(#nodeGrad)" stroke="#1e293b" stroke-width="1.5" />
    <rect width="180" height="50" rx="8" fill="none" stroke="#ef4444" stroke-width="1.5" opacity="0.3" />
    <circle cx="25" cy="25" r="10" fill="#ef4444" filter="url(#redGlow)" />
    <path d="M22,22 L28,28 M28,22 L22,28" stroke="#ffffff" stroke-width="1.5" />
    <text x="50" y="24" class="node-text">hunterpro.ai</text>
    <text x="50" y="38" class="node-status" fill="#fca5a5">REGISTERED (WHOIS)</text>
  </g>

  <!-- NODE 5: .cloud (AVAILABLE) -->
  <g transform="translate(420, 340)">
    <rect width="180" height="50" rx="8" fill="url(#nodeGrad)" stroke="#1e293b" stroke-width="1.5" />
    <rect width="180" height="50" rx="8" fill="none" stroke="#22c55e" stroke-width="1.5" filter="url(#greenGlow)" opacity="0.4" />
    <circle cx="25" cy="25" r="10" fill="#22c55e" filter="url(#greenGlow)" />
    <path d="M21,25 L24,28 L29,21" stroke="#ffffff" stroke-width="1.5" fill="none" />
    <text x="50" y="24" class="node-text">hunterpro.cloud</text>
    <text x="50" y="38" class="node-status" fill="#a7f3d0">AVAILABLE (WHOIS)</text>
  </g>

  <!-- Laser Beam/Scan sweep across TLD nodes -->
  <line x1="390" y1="20" x2="390" y2="380" stroke="url(#cyanPurple)" stroke-width="2.5" opacity="0.6" filter="url(#cyanGlow)" />
</svg>
