<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <defs>
    <linearGradient id="cyanPurple" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#00f2fe" />
      <stop offset="100%" stop-color="#9b51e0" />
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="2" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
  </defs>
  <!-- Background -->
  <rect width="100%" height="100%" fill="#030712" rx="12" />
  
  <!-- Outer Scope ring -->
  <circle cx="32" cy="32" r="24" fill="none" stroke="url(#cyanPurple)" stroke-width="2" filter="url(#glow)" />
  <circle cx="32" cy="32" r="16" fill="none" stroke="#1e293b" stroke-width="1" />
  
  <!-- Crosshairs -->
  <line x1="32" y1="8" x2="32" y2="56" stroke="url(#cyanPurple)" stroke-width="1" opacity="0.6" stroke-dasharray="2 2" />
  <line x1="8" y1="32" x2="56" y2="32" stroke="url(#cyanPurple)" stroke-width="1" opacity="0.6" stroke-dasharray="2 2" />
  
  <!-- Glowing Target Node -->
  <circle cx="42" cy="22" r="3" fill="#00f2fe" filter="url(#glow)" />
  
  <!-- Center Target Dot -->
  <circle cx="32" cy="32" r="1.5" fill="#ffffff" />
</svg>
